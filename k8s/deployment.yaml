apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-multimedia
  namespace: fococero
  labels:
    app: ms-multimedia
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ms-multimedia
  template:
    metadata:
      labels:
        app: ms-multimedia
        tier: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ms-multimedia
          image: 486507079259.dkr.ecr.us-east-1.amazonaws.com/fococero-ms-multimedia:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
              protocol: TCP
          envFrom:
            - secretRef:
                name: fococero-env
          env:
            - name: PORT
              value: '3005'
            - name: DB_NAME
              value: 'multimedia_db'
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '256Mi'
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
