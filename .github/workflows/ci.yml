name: CI - MS Multimedia

# 1. ¿Cuándo se ejecuta este pipeline?
on:
  push:
    branches: ["main", "develop"]
    # Solo se ejecuta si hay cambios DENTRO de la carpeta ms-multimedia
  pull_request:
    branches: ["main", "develop"]

# 2. ¿Qué trabajos (jobs) va a realizar?
jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    # Establecemos el directorio de trabajo por defecto para todos los pasos

    steps:
      # Paso 1: Clonar el repositorio en la máquina virtual de GitHub
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # Paso 2: Instalar Node.js (usando la versión 22)
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Paso 3: Instalar dependencias exactas (Clean Install)
      - name: 📦 Instalar Dependencias
        run: npm ci

      # Paso 4: Ejecutar la suite de pruebas (Jest & Supertest) con cobertura
      - name: 🧪 Ejecutar Tests
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          PORT: 3005
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: testdb
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'fococero-test' }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL || 'test@fococero-test.iam.gserviceaccount.com' }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY || 'test-key' }}
          GATEWAY_URL: ${{ secrets.GATEWAY_URL || 'http://localhost:3000' }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET || 'fococero-test.appspot.com' }}
          EUREKA_HOST: localhost
          INTERNAL_SECRET_TOKEN: ${{ secrets.INTERNAL_SECRET_TOKEN || 'test-token' }}

      # Paso 5: Compilar el código TypeScript a JavaScript
      - name: 🏗️ Compilar TypeScript (Build)
        run: npm run build

