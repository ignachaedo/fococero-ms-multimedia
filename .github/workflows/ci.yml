name: CI - ms-multimedia
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  construir-y-verificar:
    name: Construir y Verificar
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas con cobertura
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          PORT: 3005
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: testdb
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'fococero-test' }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL || 'test@fococero-test.iam.gserviceaccount.com' }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY || 'test-key' }}
          GATEWAY_URL: ${{ secrets.GATEWAY_URL || 'http://localhost:3000' }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET || 'fococero-test.appspot.com' }}
          EUREKA_HOST: localhost
          INTERNAL_SECRET_TOKEN: ${{ secrets.INTERNAL_SECRET_TOKEN || 'test-token' }}

      - name: Compilar proyecto
        run: npm run build
